notes: |
  First full-showcase refresh through /run-evals. Suite has grown
  from 14 to 28 questions since the 2026-05-19 baseline; this is
  the first measured pass over the full 28.

  Cost: $15.80 candidate-only. Wall clock: mean 42s per question,
  total ~20 min over 4 parallel batches of 7. Zero hallucinated
  citations across all 28 answers.

  ============================================================
  Comparison vs 2026-05-19-offshoreai-agent-full (14 questions)
  ============================================================

  May 19 result on the original 14: 11 PASS / 3 PARTIAL / 0 FAIL.
  Today's result on the same 14: 12 PASS / 2 PARTIAL / 0 FAIL.

    show-trusts-firewall      pass    → partial  (citation-recall)
    show-article-47           pass    → pass
    show-jpf-vs-expert        pass    → pass
    show-trusts-comparison    pass    → pass
    show-aifmd-nppr           partial → partial   (same blemish)
    show-pillar-two           pass    → pass
    show-eviction             pass    → partial  (missed 2025 amendment)
    show-arrest               pass    → pass
    show-planning             pass    → pass
    show-tenancy-2025         pass    → pass
    show-drug-driving         pass    → pass
    show-parish-hall          pass    → pass
    show-voisinage            partial → partial   (different miss)
    show-friday-passing       partial → partial   (different misses)

  Net within the May 19 14: +2 PASS net (article-47 and trusts-
  comparison silently held; eviction regressed; firewall regressed
  on citation-recall but held substance).

  Of the 14 newer questions added since May 19, 10 PASS and 4
  PARTIAL (with continuation-funds being a regression on prior
  PASS).

  ============================================================
  Notable patterns
  ============================================================

  1. **Citation-recall regression on flagship-trust topics.**
     show-trusts-firewall: 1 cited file vs baseline 6. show-iom-
     portfolio-bond: 1 vs 4. Substance held in both but the
     "graph visibly traversed" demo bar weakened. Worth a
     diagnostic — possibly the retrieval-path discipline (whole-
     file reads after one good landing) is suppressing follow-on
     reads even when the question would benefit.

  2. **Retrieval-path misses on adjacent files.**
     show-aifmd-nppr (Art 42 / AIF Regs 2012), show-voisinage
     (Pothier / Le Geyt), show-continuation-funds (mechanics
     beyond market data), show-eviction (2025 Amendment).
     Pattern: agent finds A good file, doesn't expand. Defence-
     in-depth corpus fix: cross-references on those landing files
     should foreground the missed material more prominently (same
     as the Pillar Two mirror fix landed earlier today).

  3. **Voice slip.**
     show-friday-passing: "Let me search..." planning fragment
     leaked into the answer. Investigation worthwhile — first
     observed instance of this leak pattern in production answers.

  4. **Rubric staleness for two questions** flagged by graders:
     show-listing-vehicle ("BVI no equivalent yet" — outdated;
     BVI MTT 2025 now exists). show-pillar-two (MCIT Law year
     2024 vs 2025).
