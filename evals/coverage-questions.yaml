# Coverage Questions — Offshore AI
#
# Tracked test set for measuring how well the knowledge graph
# answers real user questions. See README.md for methodology.
#
# Scoring:
#   pass    = ≥ 80% of expected facts covered, right files cited
#   partial = 30-80% coverage
#   fail    = < 30% coverage, can't answer, or wrong
#
# Run cadence: weekly initially, monthly once stable.
#
# Last full run: 2026-05-18 (initial baseline)

version: 5-smoke-default
last_run: 2026-05-26  # smoke set; full suite still 2026-05-18
notes: |
  v1 (2026-05-18): self-graded baseline after residential-tenancy build.
  v2 (2026-05-18): self-graded after family-law build.
  v3 (2026-05-18): full externally-measured run via Agent-tool runner.
  All 17 questions executed by fresh Explore subagents constrained to
  read-only filesystem access on the jersey/ corpus only.
  All 17 measured outcomes match v2 predictions: 12 pass, 5 fail.
  v3-postfill (2026-05-18, same day): road-traffic section built;
  rt-rd-001 and rt-rd-002 re-measured and converted FAIL → PASS.
  Running score: 14 pass / 3 fail. Remaining 3 gaps: planning,
  welfare, PPCE — the next gap-fill targets.
  v5-smoke-default (2026-05-26): introduced the **default smoke
  set** — a small curated cross-surface set (8 from this file +
  1 adversarial = 9 total) that is the default run on every
  iteration. Section-specific runs only when changing that
  section's content; full-suite runs only on the documented
  cadence (weekly initially → monthly once stable). Added 3
  new smoke-only questions (sm-tax-001 zero-ten/Pillar Two,
  sm-xjur-001 Jersey-vs-Cayman fund choice, sm-co-001 CJL Art
  115 solvency) to give the smoke set tax, cross-jurisdictional,
  and CJL-companies coverage without requiring full-suite runs.
  v4-sectioned (2026-05-26): introduced top-level `sections:` map
  so the eval suite can be run a portion at a time rather than as
  a whole-suite token burn. Added `statute-depth-companies` and
  `statute-depth-aml` sections probing per-Article distinctions
  exposed by the May 2026 statute-wiki build-out (LLC 2018,
  partnership family, Terrorism 2002, Forfeiture 2018,
  Investigation of Fraud 1991, PoCSB 2008). Legacy questions
  retain their ID-prefix grouping; the new sections-map maps each
  prefix to a section name. New statute-depth questions are
  pending first measured run.

# =====================================================
# Sections — for selective eval runs
# =====================================================
#
# The runner can filter by section so only a subset of questions
# runs. This keeps token cost proportional to what changed: when
# a doctrinal section is touched, run only that section's eval —
# not the whole suite.
#
# Each section maps an ID prefix to a description and a sample
# command. The legacy ID-prefix groups are documented for the
# existing 26 questions; new questions added in v4+ should carry
# an explicit `section:` field on the question itself.
sections:
  residential-tenancy:
    prefix: "rt-"
    description: "Residential Tenancy Law 2011 + 2025 Amendment"
    legacy: true
  road-traffic:
    prefix: "rt-rd-"
    description: "Road Traffic Law 1956 + Parish Hall Enquiry"
    legacy: true
  planning:
    prefix: "pl-"
    description: "Planning and Building Law 2002"
    legacy: true
  family:
    prefix: "fa-"
    description: "Matrimonial Causes / Children / Civil Partnership"
    legacy: true
  capacity:
    prefix: "cap-"
    description: "Capacity and Self-Determination Law 2016"
    legacy: true
  mental-health:
    prefix: "mh-"
    description: "Mental Health Law 2016"
    legacy: true
  civil-liberties:
    prefix: "civ-"
    description: "Civil Liberties — discrimination / FOI / RIPL"
    legacy: true
  freedom-of-information:
    prefix: "foi-"
    description: "Freedom of Information Law 2011"
    legacy: true
  investigatory-powers:
    prefix: "ripl-"
    description: "Regulation of Investigatory Powers Law 2005"
    legacy: true
  education:
    prefix: "edu-"
    description: "Education Law 1999"
    legacy: true
  consumer-safety:
    prefix: "cs-"
    description: "Consumer Safety regime"
    legacy: true
  health-safety-work:
    prefix: "hsw-"
    description: "Health & Safety at Work Law 1989"
    legacy: true
  rented-dwellings:
    prefix: "rd-"
    description: "Rented Dwellings (standards) Law"
    legacy: true
  welfare:
    prefix: "we-"
    description: "Social Security + Income Support"
    legacy: true
  criminal-procedure:
    prefix: "cr-"
    description: "PPCE 2003"
    legacy: true
  sanity:
    prefix: "sn-"
    description: "Sanity checks on original professional personas — should pass; flag regressions"
    legacy: true
  # ---- v4 sections ----
  statute-depth-companies:
    prefix: "sd-co-"
    description: "Per-Article depth on LLC 2018 + partnership family + Takeovers Panel 2009"
    legacy: false
  statute-depth-aml:
    prefix: "sd-aml-"
    description: "Per-Article depth on Terrorism 2002, Forfeiture 2018, IFL 1991, PoCSB 2008"
    legacy: false
  # ---- v5: cross-surface smoke (single batch, one IDs at a time) ----
  smoke:
    prefix: "sm-"
    description: |
      Smoke-only questions that don't belong to a single topical
      section — they fill cross-surface gaps in the default
      smoke set (tax, cross-jurisdictional, CJL companies-law).
      Run as part of the default smoke set; not part of any
      section-specific run.
    legacy: false

# =====================================================
# Default smoke set — the DEFAULT eval run
# =====================================================
#
# The smoke set is what runs on every iteration. It is
# deliberately small (9 questions) and covers the most
# important surfaces in a single parallel Agent batch:
#
#   - trusts        (sn-001  — Article 47 set-aside)
#   - aml-cft       (sn-002  — MLO CDD)
#   - funds         (sn-003  — JPF vs Expert Fund)
#   - llc           (sd-co-001 — Article 47 modifiable duties)
#   - cft-statute   (sd-aml-001 — Terrorism Art 19 vs 21)
#   - tax           (sm-tax-001 — zero-ten + Pillar Two)
#   - cross-juris   (sm-xjur-001 — Jersey vs Cayman fund choice)
#   - companies-law (sm-co-001 — CJL Article 115 solvency)
#   - adversarial   (adv-nonexistent-llc-article — in
#                    adversarial-citations.yaml; honesty regression)
#
# A passing smoke run is the minimum quality gate for any
# corpus change. Section-specific runs are scoped to changed
# content; full-suite runs only on the cadence in README.md.
#
# Editorial policy: add a smoke question only when a new
# load-bearing surface emerges (e.g. a new flagship statute,
# a new product class) — keep the smoke set small.
default_smoke_set:
  - sn-001
  - sn-002
  - sn-003
  - sd-co-001
  - sd-aml-001
  - sm-tax-001
  - sm-xjur-001
  - sm-co-001
  # — plus from adversarial-citations.yaml:
  - adv-nonexistent-llc-article

