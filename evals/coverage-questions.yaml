# Coverage Questions — Offshore AI
#
# Tracked test set for measuring how well the knowledge graph
# answers real user questions. See README.md for methodology.
#
# Scoring:
#   pass    = ≥ 80% of expected facts covered, right files cited
#   partial = 30-80% coverage
#   fail    = < 30% coverage, can't answer, or wrong
#
# Run cadence: weekly initially, monthly once stable.
#
# Last full run: 2026-05-18 (initial baseline)

version: 3
last_run: 2026-05-18
notes: |
  v1 (2026-05-18): self-graded baseline after residential-tenancy build.
  v2 (2026-05-18): self-graded after family-law build.
  v3 (2026-05-18): FIRST MEASURED RUN using the Agent-tool runner —
  see README.md for methodology. 8 of 17 questions scored against
  fresh Explore subagents constrained to read-only access on the
  jersey/ corpus only. All 8 measured outcomes matched v2 predictions:
  6 pass, 2 fail. The 9 not-yet-measured questions retain their v2
  self-graded scores (annotated below). Run the remaining 9 to
  complete full external measurement.

questions:

  # =====================================================
  # TRIGGER QUESTION — the gap that prompted the audit
  # =====================================================
  - id: rt-001
    persona: tenant-landlord
    asked_by: landlord
    question: "My tenant doesn't pay rent. Can I easily evict them? What protections do they have?"
    expected_facts:
      - "No self-help — eviction requires court order"
      - "7-day written breach notice required first"
      - "Petty Debts Court has exclusive original jurisdiction"
      - "Viscount enforces eviction orders"
      - "Stay of execution likely for vulnerable tenants"
      - "Timeline typically 2-4 months"
      - "Tenant defences include set-off for disrepair, discrimination, retaliation"
    expected_files:
      - "jersey/residential-tenancy/non-payment-of-rent.md"
      - "jersey/residential-tenancy/eviction-procedure.md"
      - "jersey/use-cases/tenant-landlord/evicting-non-paying-tenant.md"
    score:
      2026-05-18: pass  # v1/v2 self-graded
      2026-05-18-measured: pass  # v3 Agent-tool runner: 7/7 facts, 3/3 files

  # =====================================================
  # RESIDENTIAL TENANCY (built 2026-05-18)
  # =====================================================
  - id: rt-002
    persona: tenant-landlord
    asked_by: tenant
    question: "My landlord just gave me a 3-month notice with no reason. Is that valid?"
    expected_facts:
      - "Post-2025 amendment in force from 15 April 2026"
      - "3-month notice requires a justified ground"
      - "No-fault notice now requires 12 months"
      - "Defective notice can be challenged"
    expected_files:
      - "jersey/residential-tenancy/notice-periods.md"
      - "jersey/residential-tenancy/2025-amendment-law.md"
      - "jersey/use-cases/tenant-landlord/checking-notice-validity.md"
    score:
      2026-05-18: pass
      2026-05-18-measured: pass  # v3 Agent-tool runner: 4/4 facts; cited 2/3 expected files plus equivalents (eviction-procedure.md, grounds-for-termination.md)

  - id: rt-003
    persona: tenant-landlord
    asked_by: tenant
    question: "My landlord wants to raise the rent by 8% — can they?"
    expected_facts:
      - "Post-2025 amendment caps annual increases at Jersey RPI"
      - "Once per year only"
      - "2 months' written notice required"
      - "Above-RPI requires 'significantly below market rent' carve-out"
      - "Rent Tribunal is the dispute forum"
    expected_files:
      - "jersey/residential-tenancy/rent-and-rent-reviews.md"
      - "jersey/residential-tenancy/rent-tribunal.md"
      - "jersey/residential-tenancy/2025-amendment-law.md"
    score:
      2026-05-18: pass

  - id: rt-004
    persona: tenant-landlord
    asked_by: landlord
    question: "Can I take a deposit of 3 months' rent?"
    expected_facts:
      - "No statutory cap but more than 6 weeks is unusual"
      - "Must be lodged with the Tenants' Deposit Scheme"
      - "Deposit receipt must be provided to tenant"
      - "Excessive deposits challengeable"
    expected_files:
      - "jersey/residential-tenancy/deposits.md"
    score:
      2026-05-18: pass

  - id: rt-005
