# Coverage Questions — Offshore AI
#
# Tracked test set for measuring how well the knowledge graph
# answers real user questions. See README.md for methodology.
#
# Scoring:
#   pass    = ≥ 80% of expected facts covered, right files cited
#   partial = 30-80% coverage
#   fail    = < 30% coverage, can't answer, or wrong
#
# Run cadence: weekly initially, monthly once stable.
#
# Last full run: 2026-05-18 (initial baseline)

