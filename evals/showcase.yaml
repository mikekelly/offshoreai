# Showcase Questions — Offshore AI
#
# Curated set of ~14 questions designed for a landing-page
# demonstration. The bar is HIGHER than the coverage eval:
# an answer must be substantively right AND Jersey-specific
# AND operationally useful (smart-friend voice) AND well-cited
# AND tight enough to put on a public marketing page.
#
# Coverage-eval pass ≠ showcase-eval pass. Many current passes
# may turn out to be showcase partials.
#
# Scoring dimensions:
#   substance        — facts correct, no errors
#   jersey-specific  — actually cites Jersey statutes/cases, not generic
#   voice            — operational, useful, not recital
#   citation         — multiple files cited, graph visibly used
#   tightness        — 60-90 second read, no padding
#
# Overall verdict:
#   pass     — all five dimensions adequate; would put on a landing page
#   partial  — one or two dimensions weak; needs depth fill before launch
#   fail     — three or more weak; gap exposed

version: 1
last_run: 2026-05-18
notes: |
  First showcase-eval run. The audit-driven coverage eval
  reached 26/26 PASS; this run tests against a higher bar
  designed to mirror what would actually appear on a landing
