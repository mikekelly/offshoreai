questions:

  # ===========================================
  # DEPTH ON OFFSHORE-FINANCE SPECIALISM
  # ===========================================
  - id: show-trusts-firewall
    category: depth-offshore
    question: "How does the Article 9 trust firewall work when foreign forced-heirship is in play?"
    showcase_bar:
      substance:
        - Article 9 TJL 1984 governs proper-law, validity, capacity, beneficiary rights
        - Foreign forced-heirship rules not applied by Jersey court
        - Article 9 is mandatory choice-of-law for Jersey trusts
        - Royal Court anti-suit injunctions to protect Jersey trusts
        - Practical effect: cannot use foreign succession rules to attack Jersey trust
      jersey_specific:
        - TJL 1984 specifically cited
        - Article 9 specifically named
        - Jersey case law cited if possible (e.g. cases involving foreign succession claims)
      voice: "Should sound like a Jersey trust litigator explaining to a foreign lawyer"

  - id: show-article-47
    category: depth-offshore
    question: "What's the Article 47B procedure to set aside a trustee decision for mistake — and how is Jersey wider than Pitt v Holt?"
    showcase_bar:
      substance:
        - Article 47B-J of TJL 1984
        - Statutory mistake regime (wider than English common law)
        - Three-limb S&T Trusts test
        - Wide definition of mistake under Article 47B (manner of mistake irrelevant)
        - Jersey rejects Pitt v Holt distinction between mistake and inadequate deliberation
        - Royal Court Representation procedure
      jersey_specific:
        - "Re S&T Trusts [2015] JRC259" cited
        - Article 47G specifically (for fiduciary-power exercise)
        - Contrast with Pitt v Holt; Futter v Futter [2013] UKSC 26
      voice: "Should sound like a Jersey trust litigator addressing a sophisticated reader"

  - id: show-jpf-vs-expert
    category: depth-offshore
    question: "I want to launch a club-deal PE fund through Jersey. JPF or Expert Fund?"
    showcase_bar:
      substance:
        - JPF: ≤50 investors, DSP delegation, 48-hour authorisation
        - Expert Fund: expert-investor qualification, more detailed offering doc, no investor cap
        - Decision turns on: investor count, regulatory burden tolerance, marketing reach
        - DSP responsibilities for JPFs
      jersey_specific:
        - Both regimes Jersey-specific
        - JFSC named as regulator
        - Reference to Designated Service Provider model
      voice: "Should sound like fund counsel advising a sponsor making a structuring choice"

  # ===========================================
  # CROSS-JURISDICTIONAL SOPHISTICATION
  # ===========================================
  - id: show-trusts-comparison
    category: cross-jurisdictional
    question: "Jersey trust vs Cayman STAR vs BVI VISTA — when do I use which?"
    showcase_bar:
      substance:
        - Jersey trust: classic discretionary; firewall via Article 9; broad reserved-powers (Article 9A)
        - Cayman STAR: purpose-trust regime; enforcer-based; specific use cases
        - BVI VISTA: trust designed to hold company shares; share-ownership exception
        - Comparative reasons to choose each (asset type, purpose, control retention)
      jersey_specific:
        - Article 9 / 9A specifically
        - Reference to TJL 1984
      voice: "Should sound like cross-border trust counsel"

  - id: show-aifmd-nppr
    category: cross-jurisdictional
    question: "My Jersey AIF wants to market into Germany. What's the AIFMD NPPR route?"
    showcase_bar:
      substance:
        - AIFMD National Private Placement Regime
        - Host-state notification to BaFin
        - Specific AIFMD Article 42 conditions (Article 21 reporting, etc.)
        - Jersey side: AIFM compliance with Jersey AIFM Regulations 2012
        - No EU passport — country-by-country
      jersey_specific:
        - Jersey AIFM Regulations 2012 named
        - JFSC role in NPPR
      voice: "Should sound like fund counsel guiding marketing strategy"

  - id: show-pillar-two
    category: cross-jurisdictional
    question: "Pillar Two — how does it apply to a Jersey TopCo above a UK operating business?"
    showcase_bar:
      substance:
        - 15% minimum effective tax rate via MCIT
        - Multinational Corporate Income Tax (Jersey) Law 2025
        - QDMTT (Qualified Domestic Minimum Top-up Tax) in Jersey
        - Interaction with UK Pillar Two implementation
        - Group consolidation tests
      jersey_specific:
        - MCIT Law 2025 specifically
        - Pillar Two in Jersey context, not generic OECD
      voice: "Should sound like an international tax advisor"

  # ===========================================
  # BREADTH INTO RESIDENT-FACING LAW
  # ===========================================
  - id: show-eviction
    category: breadth-resident
    question: "My tenant won't pay rent — can I evict them in Jersey?"
    showcase_bar:
      substance:
        - 7-day breach notice required first
        - Petty Debts Court has exclusive jurisdiction
        - Viscount enforces
        - 2-4 month timeline, stays of execution
        - Self-help unlawful (criminal offence)
        - Tenant defences (set-off, discrimination, vulnerability)
      jersey_specific:
        - RTJL 2011
        - 2025 amendment in force from 15 April 2026
        - Petty Debts Court / Viscount Jersey-specific
      voice: "Smart-friend tone; landlord-facing"

  - id: show-arrest
    category: breadth-resident
    question: "I've been arrested in Jersey. What are my rights?"
    showcase_bar:
      substance:
        - PPCE 2003 + Codes of Practice
        - Free legal advice 24/7
        - 24h initial detention; 36h by inspector; 96h by Royal Court warrant
        - Right to silence; caution wording
        - Right to inform someone of arrest
        - Custody record
      jersey_specific:
        - Distinctive Jersey forum (Magistrate's, Royal Court)
        - States Police + Honorary Police context
      voice: "Practical, not theoretical; what to do tomorrow morning"

  - id: show-planning
    category: breadth-resident
    question: "Do I need planning permission for a rear extension on my Jersey house?"
    showcase_bar:
      substance:
        - PBL 2002
        - GD Order 2011 permitted-development
        - Two parallel consents: planning + building approval
        - Most extensions need application
        - Conservation areas / listed buildings narrower
      jersey_specific:
        - Specific Jersey statute / GD Order
        - Department for Environment named
      voice: "Operationally useful homeowner-facing"

  # ===========================================
  # TIMELY AWARENESS OF RECENT CHANGE
  # ===========================================
  - id: show-tenancy-2025
    category: timely
    question: "What changed for Jersey residential tenancies on 15 April 2026?"
    showcase_bar:
      substance:
        - Residential Tenancy (Jersey) Amendment Law 2025 in force 15 April 2026
        - Fixed-term tenancies capped at 3 years; no successive fixed terms
        - Tenant exit on 1 month notice on any tenancy
        - Landlord no-fault notice now 12 months (not 3)
        - Rent increases capped at RPI, once per year, 2 months notice
        - Rent Tribunal established
        - Transitional rules for pre-existing tenancies
      jersey_specific:
        - 2025 Amendment Law specifically
        - 15 April 2026 specifically
      voice: "Awareness of recent reform; should not present pre-amendment law"

  - id: show-drug-driving
    category: timely
    question: "Drug-driving in Jersey — what are the rules today, and what's coming?"
    showcase_bar:
      substance:
        - Current: impairment-only regime, no statutory drug limits
        - Substantive offence under RTJL 1956
        - Police impairment evidence + blood/urine drug presence
        - February 2026 reform proposal: statutory limits + roadside drug tests
        - Reform not yet enacted
      jersey_specific:
        - Jersey-specific reform timing
      voice: "Clear distinction between current law and pending reform"

  # ===========================================
  # DISTINCTIVE JERSEY CONCEPTS
  # ===========================================
  - id: show-parish-hall
    category: distinctive
    question: "What's a Parish Hall Enquiry and when does my case go there?"
    showcase_bar:
      substance:
        - Pre-court forum run by Centenier (honorary police)
        - Up to £200 fine maximum
        - Centenier can issue caution, fine, or refer to court
        - Defendant can always opt out to Magistrate's Court
        - Schedule of offences treatable at Parish Hall (most minor motoring etc.)
        - 15 mph speeding excess / drink-driving / dangerous driving cannot be Parish Hall
      jersey_specific:
        - Centenier role specifically — unique to Jersey/Guernsey
        - Honorary Police context
        - Schedule of offences cite to Law Officers' Department
      voice: "Should sound informed and Jersey-grounded"

  - id: show-voisinage
    category: distinctive
    question: "What's voisinage and does it really apply to my neighbour problem?"
    showcase_bar:
      substance:
        - Norman customary doctrine of good neighbourhood
        - Pothier / Le Geyt foundation
        - Cause of action distinct from English nuisance
        - Objective test of unreasonable harm
        - Royal Court jurisdiction
      jersey_specific:
        - Pothier, Le Geyt cited
        - Norman customary law context
        - Distinctive to Jersey (and Guernsey)
      voice: "Sound like a Jersey advocate explaining customary-law roots"

  - id: show-friday-passing
    category: distinctive
    question: "Why does my Jersey property transfer happen on a Friday afternoon in court?"
    showcase_bar:
      substance:
        - Real-property transfers passed in the Royal Court
        - Friday afternoon hearings as historical practice
        - Two Jurats witness
        - Contract héréditaire form
        - Public registry registration follows
        - Foreign lawyers find this unusual
      jersey_specific:
        - Royal Court passing distinctive (no UK equivalent)
        - Jurats role
        - Contrat héréditaire terminology
      voice: "Should explain Jersey distinctiveness to non-Jersey reader"

  # ===========================================
  # NEW CROSS-JURISDICTIONAL DEPTH QUESTIONS
  # Added 2026-05-18 after deepening adjacent-jurisdiction directories
  # ===========================================
  - id: show-fund-routes
    category: cross-jurisdictional
    question: "I'm an emerging PE manager launching my first sub-US$100m fund. Compare Jersey JPF, Cayman ELP, BVI Approved Fund, Guernsey PIF for me."
    showcase_bar:
      substance:
        - Jersey JPF: 50-investor cap, DSP delegation, 48-hour authorisation
        - Cayman ELP: dominant closed-ended PE vehicle, registered under Private Funds Act 2020
        - BVI Approved Fund: 20-investor cap, US$100m AUM ceiling, permanent regime
        - Guernsey PIF: 3 routes (licensed manager / family / qualifying), 50-investor cap, 1-business-day approval
        - Decision framework: investor count, manager substance, marketing reach

  - id: show-cell-companies
    category: cross-jurisdictional
    question: "Bermuda SAC vs Cayman SPC vs Guernsey PCC vs Guernsey ICC — when do I use each?"
    showcase_bar:
      substance:
        - Guernsey PCC is the original (1997 Ordinance)
        - Bermuda SAC (2000) is insurance-focused; Cayman SPC (1998) is general-purpose
        - All four are cell-company vehicles
        - Guernsey ICC is the outlier — each cell is its own incorporated company
        - Decision: insurance (Bermuda); funds (Cayman); foreign-court robustness (Guernsey ICC); EU-proximate (Guernsey PCC)

  - id: show-bermuda-captive
    category: depth-offshore
    question: "I want to set up a captive insurance company for my multinational group. Why Bermuda and which Class?"
    showcase_bar:
      substance:
        - Bermuda Insurance Act 1978 + class system (Class 1 / 2 / 3 / 3A / 3B / 4 for P&C)
        - Class 1 pure single-parent captive; Class 2 multi-owner; Class 3 with unrelated business
        - Class 4 commercial reinsurance (US$100m min capital)
        - SAC option for multi-line / multi-programme captives
        - Solvency II equivalence; BMA oversight

  - id: show-iom-portfolio-bond
    category: depth-offshore
    question: "I'm a UK HNW investor — why would I hold an Isle of Man portfolio bond?"
    showcase_bar:
      substance:
        - IoM portfolio-bond: single-premium life-assurance wrapper
        - UK 5% rule for annual tax-deferred withdrawals
        - Top-slicing relief on chargeable events
        - IoM Solvency II equivalence; mature industry; major UK insurer subsidiaries

  - id: show-listing-vehicle
    category: cross-jurisdictional
    question: "We're listing on NASDAQ. Should we use Cayman Exempted, BVI BC, or Bermuda Exempted as our listing vehicle?"
    showcase_bar:
      substance:
        - Cayman Exempted is the dominant choice
        - Bermuda Exempted: BMA pre-vetting adds regulatory credibility
        - BVI BC more limited listing acceptance
        - Pillar Two: Cayman MCIT 2025; Bermuda CIT 2023; BVI no equivalent yet

  - id: show-emerging-manager-stack
    category: cross-jurisdictional
    question: "I'm a BVI-based emerging manager. What's the full structure stack — manager, fund, vehicle?"
    showcase_bar:
      substance:
        - BVI Approved Manager (light-touch alternative to full SIBA)
        - BVI Incubator Fund (US$20k min, US$20m AUM, 2-year life) or Approved Fund
        - BVI BC under BCA 2004 for vehicles
        - Transition path Incubator → Approved → Private Fund → Professional Fund
        - Economic Substance Act compliance

  # ===========================================
  # SECOND-ROUND DEPTH QUESTIONS (added 2026-05-18)
  # ===========================================
  - id: show-cayman-llc
    category: depth-offshore
    question: "We're redomiciling a Delaware LLC to Cayman. Is the Cayman LLC the right form, and how does check-the-box work?"
    showcase_bar:
      substance:
        - Limited Liability Companies Act 2016 (Cayman)
        - Cayman LLC mirrors Delaware LLC
        - Members (not shareholders), managers, LLC Agreement
        - US check-the-box default: partnership / disregarded entity
        - Difference from Cayman Exempted Company and Cayman ELP

  - id: show-jersey-vs-guernsey-trusts
    category: cross-jurisdictional
    question: "Jersey vs Guernsey trust — when do I pick which?"
    showcase_bar:
      substance:
        - Both have firewall, reserved powers, statutory mistake regimes
        - Jersey Article 9(4) more explicit on foreign-judgment non-recognition than Guernsey s.14
        - Jersey case-law on Article 47B mistake more developed (Re S&T Trusts and progeny)
        - Both have PCC; Guernsey adds ICC
        - Decision factors: existing infrastructure, sponsor familiarity, defence intensity

  - id: show-image-rights
    category: depth-offshore
    question: "I'm a celebrity wanting to protect and license my image. How does Guernsey's image-rights register work?"
    showcase_bar:
      substance:
        - Image Rights (Bailiwick of Guernsey) Ordinance 2012
        - Only jurisdiction in the world with statutory image-rights register
        - Personnage covers name, voice, signature, image, appearance
        - Registered property right — transferable, inheritable, mortgageable
        - Combination with Guernsey trust / company for wealth structuring

