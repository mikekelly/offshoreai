<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>offshoreai — corpus answering agent</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #161c24;
        --panel-2: #1d2530;
        --border: #2a3441;
        --ink: #e6edf3;
        --ink-dim: #9aa7b4;
        --accent: #4a9eff;
        --fresh: #2ea043;
        --warn: #d29922;
        --stale: #f85149;
        --missing: #db61a2;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .app { display: grid; grid-template-columns: 264px 1fr; height: 100vh; }

      /* ---- Sidebar ---- */
      .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; background: #11161d; }
      .sidebar .brand { padding: 16px 18px 10px; }
      .sidebar .brand h1 { font-size: 16px; margin: 0; letter-spacing: -0.01em; }
      .sidebar .brand .tag { color: var(--ink-dim); font-size: 11px; }
      .newchat {
        margin: 4px 14px 12px; padding: 9px 12px; background: var(--panel-2); color: var(--ink);
        border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font: inherit; font-size: 13px;
        text-align: left; display: flex; align-items: center; gap: 8px;
      }
      .newchat:hover { border-color: var(--accent); }
      .convlist { overflow-y: auto; flex: 1; padding: 0 8px 12px; }
      .convitem {
        position: relative; padding: 9px 30px 9px 12px; border-radius: 8px; cursor: pointer;
        color: var(--ink-dim); font-size: 13px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .convitem:hover { background: var(--panel); color: var(--ink); }
      .convitem.active { background: var(--panel-2); color: var(--ink); }
      .convitem .when { display: block; font-size: 11px; color: var(--ink-dim); margin-top: 1px; }
      .convitem .del {
        position: absolute; right: 6px; top: 50%; transform: translateY(-50%); border: none; background: none;
        color: var(--ink-dim); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 6px; display: none;
      }
      .convitem:hover .del { display: block; }
      .convitem .del:hover { color: var(--stale); background: var(--bg); }
      .convlist .empty { padding: 12px; font-size: 12px; color: var(--ink-dim); }

      /* ---- Content ---- */
      .content { display: flex; flex-direction: column; min-height: 0; }
      #transcript { flex: 1; overflow-y: auto; padding: 26px 28px 8px; }
      .transcript-inner { max-width: 860px; margin: 0 auto; }
      .placeholder { color: var(--ink-dim); font-size: 14px; margin-top: 40px; text-align: center; }

      .msg { margin-bottom: 22px; }
      .msg.user .bubble {
        background: var(--accent); color: #051018; padding: 10px 14px; border-radius: 12px 12px 4px 12px;
        display: inline-block; max-width: 80%; white-space: pre-wrap; word-wrap: break-word; font-size: 14px;
      }
      .msg.user { text-align: right; }
      .msg.assistant .card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px;
        border-left-width: 3px;
      }
      .msg.assistant.drafting .card { border-left-color: var(--border); }
      .msg.assistant.verified .card { border-left-color: var(--fresh); }
      .msg.assistant.rejected .card { border-left-color: var(--stale); }
      .msg.assistant.unavailable .card { border-left-color: var(--warn); }
      .msg.assistant .statusbar {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--ink-dim); margin-bottom: 10px;
      }
      .msg.assistant.verified .statuslabel { color: var(--fresh); }
      .msg.assistant.rejected .statuslabel { color: var(--stale); }
      .msg.assistant.unavailable .statuslabel { color: var(--warn); }

      .answer { word-wrap: break-word; min-height: 12px; }
      .answer > *:first-child { margin-top: 0; }
      .answer > *:last-child { margin-bottom: 0; }
      .answer h2 { font-size: 17px; margin: 22px 0 8px; color: var(--ink); }
      .answer h3 { font-size: 15px; margin: 18px 0 6px; color: var(--ink); }
      .answer p { margin: 10px 0; }
      .answer ul, .answer ol { margin: 10px 0; padding-left: 24px; }
      .answer li { margin: 4px 0; }
      .answer code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
      .answer pre { background: var(--panel-2); padding: 12px 14px; border-radius: 8px; overflow-x: auto; }
      .answer pre code { background: none; padding: 0; }
      .answer a { color: var(--accent); text-decoration: none; }
      .answer a:hover { text-decoration: underline; }
      .answer blockquote {
        margin: 14px 0; padding: 8px 14px; border-left: 3px solid var(--border);
        color: var(--ink-dim); font-style: italic; font-size: 13px;
      }
      .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(2) infinite; }
      @keyframes blink { 50% { opacity: 0; } }

      details.disc { margin-top: 12px; }
      details.disc summary { cursor: pointer; color: var(--ink-dim); font-size: 12px; padding: 6px 0; user-select: none; }
      .reasoning-body { white-space: pre-wrap; font-size: 12.5px; line-height: 1.55; color: var(--ink-dim); background: var(--panel-2); border-radius: 8px; padding: 12px 14px; max-height: 320px; overflow-y: auto; }
      .toolrow { font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink-dim); padding: 3px 0; }
      .toolrow b { color: var(--accent); font-weight: 600; }

      .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-dim); margin: 16px 0 8px; }
      .source { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
      .source:last-child { border-bottom: none; }
      .source .primary { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
      .source .primary a, .source .primary .ptitle { color: var(--ink); font-weight: 500; }
      .source .primary a:hover { color: var(--accent); }
      .source .arts { color: var(--ink-dim); font-size: 12px; margin: 2px 0; }
      .source .prov { color: var(--ink-dim); font-size: 11.5px; margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .source .prov .provpath { font: 11px/1.4 ui-monospace, Menlo, monospace; word-break: break-all; opacity: 0.8; }
      .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; }
      .badge.fresh { background: rgba(46,160,67,0.16); color: var(--fresh); }
      .badge.warn { background: rgba(210,153,34,0.16); color: var(--warn); }
      .badge.stale { background: rgba(248,81,73,0.16); color: var(--stale); }
      .badge.missing { background: rgba(219,97,162,0.16); color: var(--missing); }
      .badge.status { background: var(--panel-2); color: var(--ink-dim); }

      .verdict { margin-top: 16px; padding: 12px 14px; border-radius: 8px; background: var(--panel-2); border-left: 4px solid var(--border); }
      .verdict.pass { border-left-color: var(--fresh); }
      .verdict.warn { border-left-color: var(--warn); }
      .verdict.reject { border-left-color: var(--stale); }
      .verdict .headline { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
      .verdict .stat { color: var(--ink-dim); font-size: 12.5px; }
      .verdict .reason { margin-top: 8px; padding: 8px 10px; background: var(--bg); border-radius: 6px; font-size: 12px; }
      .verdict .reason .detail { color: var(--ink-dim); margin-top: 3px; }
      .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--warn); margin-right: 8px; animation: pulse 1.1s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

      .disclaimer { color: var(--ink-dim); font-size: 12px; font-style: italic; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 14px; }
      .err { color: var(--stale); margin-top: 8px; }

      /* ---- Composer ---- */
      .composer { border-top: 1px solid var(--border); padding: 14px 28px 18px; }
      .composer-inner { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; }
      textarea {
        flex: 1; resize: none; min-height: 50px; max-height: 200px;
        background: var(--panel); color: var(--ink); border: 1px solid var(--border); border-radius: 10px;
        padding: 13px 14px; font: inherit;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      .composer button {
        background: var(--accent); color: #051018; border: none; border-radius: 10px; padding: 0 22px;
        font-weight: 600; cursor: pointer; font-size: 14px;
      }
      .composer button:disabled { opacity: 0.5; cursor: default; }
      .hint { max-width: 860px; margin: 8px auto 0; color: var(--ink-dim); font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>offshoreai</h1>
          <div class="tag">offshore-jurisdiction answering agent</div>
        </div>
        <button class="newchat" id="newChat">+ New chat</button>
        <div class="convlist" id="convList"></div>
      </aside>

      <section class="content">
        <div id="transcript">
          <div class="transcript-inner" id="transcriptInner">
            <div class="placeholder" id="placeholder">
              Ask about Jersey, Guernsey, Cayman, BVI, Bermuda, or Isle of Man.<br />
              Every answer is cited to the corpus, badged for freshness, and checked by the citation-verifier.
            </div>
          </div>
        </div>
        <div class="composer">
          <form class="composer-inner" id="ask">
            <textarea id="q" rows="1" placeholder="Ask a question — e.g. “How does the Article 9 trust firewall work?”" autofocus></textarea>
            <button id="go" type="submit">Ask</button>
          </form>
          <div class="hint">Enter to send · Shift+Enter for a new line</div>
        </div>
      </section>
    </div>

    <script type="module">
      // Pure rendering helpers live in render.js (single source of truth,
      // unit-tested in ../test/render.test.ts). Everything else stays here.
      import { esc, escAttr, isSafeUrl, mdToHtml, stripProvenance } from "./render.js";

      const $ = (id) => document.getElementById(id);
      const transcriptInner = $("transcriptInner"), transcript = $("transcript");
      const placeholder = $("placeholder");
      const convList = $("convList");
      const form = $("ask"), q = $("q"), go = $("go");

      function relTime(iso) {
        const d = Date.now() - new Date(iso).getTime();
        const m = Math.floor(d / 60000), h = Math.floor(d / 3600000), days = Math.floor(d / 86400000);
        if (m < 1) return "just now";
        if (m < 60) return m + "m ago";
        if (h < 24) return h + "h ago";
        if (days < 7) return days + "d ago";
        return new Date(iso).toLocaleDateString();
      }

      // ---- Transcript rendering ----
      let currentConversationId = null;

      function clearTranscript() {
        transcriptInner.innerHTML = "";
      }

      function addUserMsg(text) {
        const div = document.createElement("div");
        div.className = "msg user";
        const b = document.createElement("div");
        b.className = "bubble";
        b.textContent = text;
        div.appendChild(b);
        transcriptInner.appendChild(div);
        return div;
      }

      // Build an assistant message and return refs the stream/history writes
      // into. Each message is one DRAFT — a revise event creates a NEW message
      // below for the corrected draft, leaving the rejected one visible.
      function addAssistantMsg() {
        const div = document.createElement("div");
        div.className = "msg assistant drafting";
        div.innerHTML = `
          <div class="card">
            <div class="statusbar"><span class="statuslabel">Drafting…</span></div>
            <div class="answer cursor"></div>
            <details class="disc reasoningBox" hidden><summary>Agent reasoning</summary><div class="reasoning-body"></div></details>
            <details class="disc toolsBox" hidden><summary><span class="toolCount">0</span> tool calls</summary><div class="tools"></div></details>
            <div class="sourcesWrap" hidden><div class="section-label">Sources &amp; freshness</div><div class="sources"></div></div>
            <div class="verdictWrap" hidden></div>
            <div class="disclaimer" hidden>This is information drawn from the offshoreai corpus, not legal, tax, or investment advice. Verify the cited primary sources before acting.</div>
          </div>`;
        transcriptInner.appendChild(div);
        return {
          root: div,
          statuslabel: div.querySelector(".statuslabel"),
          answerEl: div.querySelector(".answer"),
          reasoningBox: div.querySelector(".reasoningBox"),
          reasoningEl: div.querySelector(".reasoning-body"),
          toolsBox: div.querySelector(".toolsBox"),
          toolsEl: div.querySelector(".tools"),
          toolCount: div.querySelector(".toolCount"),
          sourcesWrap: div.querySelector(".sourcesWrap"),
          sourcesEl: div.querySelector(".sources"),
          verdictWrap: div.querySelector(".verdictWrap"),
          disclaimerEl: div.querySelector(".disclaimer"),
          rawMd: "",
          nTools: 0,
          nSources: 0,
        };
      }

      function setStatus(refs, status, label) {
        refs.root.classList.remove("drafting", "verified", "rejected", "unavailable");
        refs.root.classList.add(status);
        refs.statuslabel.textContent = label;
      }

      const scrollDown = () => { transcript.scrollTop = transcript.scrollHeight; };

      const KIND_LABEL = {
        statute: "statute", guidance: "regulator guidance", "gov-page": "gov.je",
        judgment: "judgment", secondary: "secondary",
      };

      function renderCitation(refs, c) {
        refs.sourcesWrap.hidden = false;
        refs.nSources++;
        const row = document.createElement("div");
        row.className = "source";
        const sources = c.sources || [];
        let html = "";

        // Primary sources first — linked to the statute / official page.
        if (sources.length) {
          for (const s of sources) {
            const label = esc(s.title || s.url);
            // Scheme-check + attribute-escape the URL before it lands in href.
            const link = (s.url && isSafeUrl(s.url))
              ? `<a href="${escAttr(s.url)}" target="_blank" rel="noopener noreferrer">${label}</a>`
              : `<span class="ptitle">${label}</span>`;
            const kind = s.kind ? `<span class="badge status">${esc(KIND_LABEL[s.kind] || s.kind)}</span>` : "";
            html += `<div class="primary">${link} ${kind}</div>`;
          }
        } else {
          // No primary source on the file (e.g. a synthesis/index doc).
          html += `<div class="primary"><span class="ptitle">${esc(c.title || c.path)}</span></div>`;
        }

        if ((c.articles || []).length) {
          html += `<div class="arts">Articles: ${c.articles.map((a) => esc(String(a))).join(", ")}</div>`;
        }

        // Provenance: the internal corpus file + freshness badge.
        const fr = c.freshness;
        const age = c.ageDays == null ? "" : ` · ${c.ageDays}d`;
        const prov = fr === "missing"
          ? "path not found in corpus — possible hallucinated citation"
          : (c.lastVerified ? "verified " + c.lastVerified : "no last_verified") + age;
        html +=
          `<div class="prov"><span class="badge ${fr}">${esc(fr)}</span>` +
          (c.status ? `<span class="badge status">${esc(c.status)}</span>` : "") +
          `<span class="provpath">${esc(c.path)}</span> · ${esc(prov)}</div>`;

        row.innerHTML = html;
        refs.sourcesEl.appendChild(row);
      }

      function renderVerdict(refs, v) {
        refs.verdictWrap.hidden = false;
        const reject = v.rejectCount > 0;
        const cls = reject ? "reject" : (v.claimsWithCitation < v.claimsChecked ? "warn" : "pass");
        // Drive the message-level status (border + statusbar label).
        if (reject) {
          setStatus(refs, "rejected", `Rejected ✕ — ${v.rejectCount} unresolved issue(s)`);
        } else {
          setStatus(refs, "verified", `Verified ✓ — ${v.claimsWithCitation}/${v.claimsChecked} claims cited`);
        }
        let html =
          `<div class="verdict ${cls}">` +
          `<div class="headline">✓ Second opinion on citation quality completed</div>` +
          `<div class="stat">Verdict: <strong>${esc(v.kind)}</strong>${reject ? ` — ${v.rejectCount} issue(s) flagged` : " — clean"}</div>` +
          `<div class="stat">${v.claimsWithCitation}/${v.claimsChecked} claims carry a citation</div>`;
        if (v.notes) html += `<div class="stat">${esc(v.notes)}</div>`;
        for (const r of v.reasons || []) {
          html += `<div class="reason"><div>${esc(r.claim)}</div><div class="detail">[${esc(r.issueKind)}] ${esc(r.citedSource || "—")} · ${esc(r.detail)}</div></div>`;
        }
        html += `</div>`;
        refs.verdictWrap.innerHTML = html;
      }

      // Render the rejected verdict on a draft that is being SUPERSEDED by a
      // corrected next draft (the revise path). The card stays in the thread
      // as a transparent record of what was attempted and why it failed.
      function renderRejectedSuperseded(refs, ev) {
        setStatus(refs, "rejected", `Rejected ✕ — superseded by next draft (${ev.rejectCount} claim${ev.rejectCount === 1 ? "" : "s"} flagged)`);
        refs.verdictWrap.hidden = false;
        let html = `<div class="verdict reject"><div class="headline">✕ Rejected by the citation-verifier — superseded by the next draft</div>`;
        for (const r of ev.reasons || []) {
          html += `<div class="reason"><div>${esc(r.claim)}</div><div class="detail">[${esc(r.issueKind)}] ${esc(r.detail)}</div></div>`;
        }
        html += `</div>`;
        refs.verdictWrap.innerHTML = html;
      }

      function showVerifyRunning(refs) {
        refs.verdictWrap.hidden = false;
        refs.verdictWrap.innerHTML =
          `<div class="verdict"><div class="headline"><span class="pulse"></span>Delegating to the citation-verifier subagent</div>` +
          `<div class="stat">Getting a second opinion on citation quality…</div></div>`;
      }

      function onEvent(refs, ev) {
        switch (ev.type) {
          case "text":
            refs.rawMd += ev.delta;
            refs.answerEl.innerHTML = mdToHtml(refs.rawMd);
            refs.answerEl.classList.add("cursor");
            scrollDown();
            break;
          case "reset":
            refs.rawMd = "";
            refs.answerEl.innerHTML = "";
            break;
          case "reasoning":
            refs.reasoningBox.hidden = false;
            refs.reasoningEl.textContent += ev.delta;
            refs.reasoningEl.scrollTop = refs.reasoningEl.scrollHeight;
            break;
          case "tool": {
            refs.nTools++;
            refs.toolsBox.hidden = false;
            refs.toolCount.textContent = String(refs.nTools);
            const row = document.createElement("div");
            row.className = "toolrow";
            let arg = ""; try { arg = JSON.stringify(ev.input); } catch {}
            row.innerHTML = `<b>${esc(ev.name)}</b> ${esc(arg.slice(0, 160))}`;
            refs.toolsEl.appendChild(row);
            break;
          }
          case "citation": renderCitation(refs, ev); break;
          case "verify_start": showVerifyRunning(refs); break;
          // `revise` is handled at the dispatch level (see ask()): it
          // finalizes the current draft as rejected (keeping it visible) and
          // opens a NEW assistant message for the corrected draft. It is NOT
          // routed through onEvent so the new message can replace `refs`.
          case "verify_error":
            // Verification unavailable (verifier threw or returned unparseable
            // output). Keep the answer; show a soft caution, never a dead-end.
            setStatus(refs, "unavailable", "Verification unavailable ⚠");
            refs.answerEl.classList.remove("cursor");
            refs.verdictWrap.hidden = false;
            refs.verdictWrap.innerHTML =
              `<div class="verdict warn"><div class="headline">⚠ Citation check could not be completed</div>` +
              `<div class="stat">The citation-verifier didn't return a usable result${ev.message ? " (" + esc(ev.message) + ")" : ""}.</div>` +
              `<div class="stat">The answer is shown as drafted — treat its citations with extra caution and verify the primary sources before relying on them.</div></div>`;
            break;
          case "verdict": renderVerdict(refs, ev); break;
          case "done":
            // Final clean render: prefer the server's canonical answer and
            // drop the trailing corpus-path provenance list.
            refs.rawMd = stripProvenance(ev.answer && ev.answer.trim() ? ev.answer : refs.rawMd);
            refs.answerEl.innerHTML = mdToHtml(refs.rawMd);
            refs.answerEl.classList.remove("cursor");
            refs.disclaimerEl.hidden = false;
            scrollDown();
            break;
          case "error": {
            refs.answerEl.classList.remove("cursor");
            const e = document.createElement("div");
            e.className = "err";
            e.textContent = "Error: " + ev.message;
            refs.answerEl.appendChild(e);
            break;
          }
        }
      }

      // ---- Sidebar ----
      async function loadConversations() {
        try {
          const list = await (await fetch("/api/conversations")).json();
          convList.innerHTML = "";
          if (!list.length) { convList.innerHTML = '<div class="empty">No conversations yet.</div>'; return; }
          for (const c of list) {
            const item = document.createElement("div");
            item.className = "convitem" + (c.id === currentConversationId ? " active" : "");
            item.innerHTML = `<span>${esc(c.title)}</span><span class="when">${relTime(c.updatedAt)} · ${c.turnCount} turn${c.turnCount === 1 ? "" : "s"}</span><button class="del" title="Delete">✕</button>`;
            item.addEventListener("click", (e) => {
              if (e.target.classList.contains("del")) return;
              openConversation(c.id);
            });
            item.querySelector(".del").addEventListener("click", async (e) => {
              e.stopPropagation();
              await fetch("/api/conversations/" + encodeURIComponent(c.id), { method: "DELETE" });
              if (c.id === currentConversationId) newChat();
              loadConversations();
            });
            convList.appendChild(item);
          }
        } catch {}
      }

      function renderDraftFinalState(refs, draft) {
        if (draft.verifyError) {
          setStatus(refs, "unavailable", "Verification unavailable ⚠");
          refs.verdictWrap.hidden = false;
          refs.verdictWrap.innerHTML =
            `<div class="verdict warn"><div class="headline">⚠ Citation check could not be completed</div>` +
            `<div class="stat">${esc(draft.verifyError)}</div>` +
            `<div class="stat">The answer is shown as drafted — treat its citations with extra caution.</div></div>`;
        } else if (draft.verdict) {
          if (draft.superseded) {
            renderRejectedSuperseded(refs, { rejectCount: draft.verdict.rejectCount, reasons: draft.verdict.reasons });
          } else {
            renderVerdict(refs, draft.verdict);
          }
        }
      }

      async function openConversation(id) {
        try {
          const convo = await (await fetch("/api/conversations/" + encodeURIComponent(id))).json();
          currentConversationId = id;
          clearTranscript();
          for (const turn of convo.turns) {
            addUserMsg(turn.question);
            for (const draft of (turn.drafts || [])) {
              const refs = addAssistantMsg();
              refs.rawMd = stripProvenance(draft.answer);
              refs.answerEl.innerHTML = mdToHtml(refs.rawMd);
              refs.answerEl.classList.remove("cursor");
              for (const c of draft.citations || []) renderCitation(refs, c);
              renderDraftFinalState(refs, draft);
              refs.disclaimerEl.hidden = false;
            }
          }
          loadConversations();
          scrollDown();
        } catch {}
      }

      function newChat() {
        currentConversationId = null;
        clearTranscript();
        transcriptInner.appendChild(placeholder);
        placeholder.style.display = "";
        loadConversations();
        q.focus();
      }
      $("newChat").addEventListener("click", newChat);

      // ---- Ask ----
      async function ask(question) {
        if (placeholder.parentNode) placeholder.remove();
        addUserMsg(question);
        // `curRefs` holds the active draft's message. A `revise` event swaps
        // it: the rejected draft stays visible above, the new draft begins.
        let curRefs = addAssistantMsg();
        scrollDown();
        try {
          const resp = await fetch("/api/ask", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ question, conversationId: currentConversationId }),
          });
          if (!resp.ok || !resp.body) {
            const t = await resp.text().catch(() => "");
            onEvent(curRefs, { type: "error", message: `HTTP ${resp.status} ${t}` });
            return;
          }
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";
          const handleLine = (line) => {
            if (!line) return;
            let ev; try { ev = JSON.parse(line); } catch { return; }
            if (ev.type === "conversation") { currentConversationId = ev.id; return; }
            if (ev.type === "revise") {
              // Finalize the current draft (visibly rejected, kept in thread,
              // trailing corpus-path list stripped), then open a fresh message
              // for the corrected draft. Subsequent events target the new one.
              curRefs.rawMd = stripProvenance(ev.answer || curRefs.rawMd);
              curRefs.answerEl.innerHTML = mdToHtml(curRefs.rawMd);
              curRefs.answerEl.classList.remove("cursor");
              renderRejectedSuperseded(curRefs, ev);
              curRefs = addAssistantMsg();
              scrollDown();
              return;
            }
            onEvent(curRefs, ev);
          };
          for (;;) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            let nl;
            while ((nl = buf.indexOf("\n")) >= 0) { handleLine(buf.slice(0, nl).trim()); buf = buf.slice(nl + 1); }
          }
          if (buf.trim()) handleLine(buf.trim());
        } catch (err) {
          onEvent(curRefs, { type: "error", message: String(err) });
        } finally {
          curRefs.answerEl.classList.remove("cursor");
          loadConversations();
        }
      }

      // textarea autosize + Enter-to-send
      q.addEventListener("input", () => { q.style.height = "auto"; q.style.height = Math.min(q.scrollHeight, 200) + "px"; });
      q.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
      });
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = q.value.trim();
        if (!question) return;
        q.value = ""; q.style.height = "auto";
        go.disabled = true;
        try { await ask(question); } finally { go.disabled = false; q.focus(); }
      });

      loadConversations();
    </script>
  </body>
</html>
